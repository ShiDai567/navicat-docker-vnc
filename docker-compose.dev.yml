# 开发环境：本地构建镜像
services:
  navicat:
    build: .
    image: navicat-dev
    container_name: navicat-dev
    ports:
      - 5800:5800   # Web GUI
      - 5900:5900   # VNC
    volumes:
      - ./data/config:/root/.config/navicat
      - ./data/logs:/config/log
    environment:
      - TZ=Asia/Shanghai
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - KEEP_APP_RUNNING=1
    restart: unless-stopped
